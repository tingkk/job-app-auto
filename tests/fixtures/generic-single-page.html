<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Generic Job Application Fixture</title>
  </head>
  <body>
    <form>
      <label for="first">First name</label>
      <input id="first" autocomplete="given-name" />

      <label for="last">Last name</label>
      <input id="last" autocomplete="family-name" />

      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="email" />

      <label for="phone">电话</label>
      <input id="phone" type="tel" />

      <label for="resume">Resume / CV</label>
      <input id="resume" type="file" />

      <button type="button">Next fixture step</button>
      <button type="submit">Submit fixture</button>
    </form>
  </body>
</html>
