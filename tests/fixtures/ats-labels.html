<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ATS Label Fixture</title>
  </head>
  <body>
    <h1>ATS label patterns</h1>
    <form data-ats="workday">
      <label>Workday Legal First Name <input name="legalFirstName" /></label>
      <label>Workday Legal Last Name <input name="legalLastName" /></label>
    </form>
    <form data-ats="greenhouse">
      <label>Greenhouse Resume <input type="file" name="resume" /></label>
      <label>LinkedIn Profile <input name="urls[LinkedIn]" /></label>
    </form>
    <form data-ats="lever">
      <label>Current company <input name="org" /></label>
      <label>Portfolio URL <input name="urls[Portfolio]" /></label>
    </form>
    <form data-ats="smartrecruiters">
      <label>Phone number <input name="phoneNumber" /></label>
    </form>
    <form data-ats="ashby">
      <label>Email <input name="email" type="email" /></label>
    </form>
    <form data-ats="icims">
      <label>Postal Code <input name="postalCode" /></label>
    </form>
    <form data-ats="taleo">
      <label>Country/Region <select name="country"><option value="US">United States</option></select></label>
    </form>
  </body>
</html>
